info:
  name: Get user profile
  type: http
  seq: 3

http:
  method: GET
  url: "{{app_url}}/{{v1_api}}/{{auth_endpoint}}/profile"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  body:
    type: json
    data: |-
      {
        "email": "jane.doe2@example.com",
        "password": "securePass123"
      }
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
