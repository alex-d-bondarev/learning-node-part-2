info:
  name: Update product by ID
  type: http
  seq: 6

http:
  method: PUT
  url: "{{app_url}}/{{v1_api}}/{{products_endpoint}}/{{product_id}}"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: macbook 43
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
