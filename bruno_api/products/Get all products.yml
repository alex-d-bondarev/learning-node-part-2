info:
  name: Get all products
  type: http
  seq: 2

http:
  method: GET
  url: "{{app_url}}/{{v1_api}}/{{products_endpoint}}?page=3&limit=25"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  params:
    - name: page
      value: "3"
      type: query
    - name: limit
      value: "25"
      type: query
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
