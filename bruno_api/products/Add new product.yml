info:
  name: Add new product
  type: http
  seq: 5

http:
  method: POST
  url: "{{app_url}}/{{v1_api}}/{{products_endpoint}}"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: Apple Vision Glasses
      - name: price
        type: text
        value: "9999"
      - name: category
        type: text
        value: 6a4a78264c986bbd271d5276
      - name: countInStock
        type: text
        value: "5"
      - name: description
        type: text
        value: fancy glasses
      - name: images
        type: text
        value: ""
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
