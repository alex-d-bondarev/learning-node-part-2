info:
  name: Add new product
  type: http
  seq: 5

http:
  method: POST
  url: "{{app_url}}/{{v1_api}}/{{products_endpoint}}"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: Russell Hobbs Kettle
      - name: price
        type: text
        value: "19.99"
      - name: category
        type: text
        value: 6a5b8d551cc4a7ec1ac61e68
      - name: countInStock
        type: text
        value: "255"
      - name: description
        type: text
        value: Russell Hobbs Textures Electric 1.7L Cordless Kettle (Fast Boil 3KW, Black Premium Plastic, matt & high Gloss Finish, Removable Washable Anti-Scale Filter, Push to Open lid, Perfect Pour spout) 21271
      - name: images
        type: text
        value: ""
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
