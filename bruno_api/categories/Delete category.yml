info:
  name: Delete category
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{app_url}}/{{v1_api}}/{{category_endpoint}}/{{category_id}}"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
