info:
  name: Add new category
  type: http
  seq: 1

http:
  method: POST
  url: "{{app_url}}/{{v1_api}}/{{category_endpoint}}"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  body:
    type: json
    data: |-
      {
        "name": "users"
      }
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
