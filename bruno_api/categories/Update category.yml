info:
  name: Update category
  type: http
  seq: 4

http:
  method: PUT
  url: "{{app_url}}/{{v1_api}}/{{category_endpoint}}/{{category_id}}"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
  body:
    type: json
    data: |-
      {
        "name": "BB Category"
      }
  auth:
    type: bearer
    token: "{{login_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
