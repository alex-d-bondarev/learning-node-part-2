info:
  name: Health check
  type: http
  seq: 1

http:
  method: GET
  url: "{{app_url}}/{{v1_api}}/{{health_endpoint}}?lng=ru"
  headers:
    - name: Accept-Language
      value: "{{locale}}"
      disabled: true
  params:
    - name: lng
      value: ru
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
